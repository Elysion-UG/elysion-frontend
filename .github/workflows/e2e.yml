name: E2E Tests

on:
  # Manuell starten — z.B. gegen Staging-URL
  workflow_dispatch:
    inputs:
      base_url:
        description: "URL to test against (leave empty for staging default)"
        required: false
        default: ""

  # Täglich um 6 Uhr gegen Staging
  schedule:
    - cron: "0 6 * * *"

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest

    env:
      BASE_URL: ${{ github.event.inputs.base_url || vars.E2E_BASE_URL || 'http://localhost:3000' }}
      NEXT_PUBLIC_API_URL: ${{ vars.E2E_API_URL || 'https://marketplace-backend-1-1w30.onrender.com' }}
      E2E_BUYER_EMAIL: ${{ secrets.E2E_BUYER_EMAIL }}
      E2E_BUYER_PASSWORD: ${{ secrets.E2E_BUYER_PASSWORD }}
      E2E_SELLER_EMAIL: ${{ secrets.E2E_SELLER_EMAIL }}
      E2E_SELLER_PASSWORD: ${{ secrets.E2E_SELLER_PASSWORD }}
      E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
      E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      # Nur wenn BASE_URL localhost ist: App lokal starten
      - name: Build app (local mode only)
        if: ${{ env.BASE_URL == 'http://localhost:3000' }}
        run: bun run build

      - name: Start app (local mode only)
        if: ${{ env.BASE_URL == 'http://localhost:3000' }}
        run: bun run start &

      - name: Wait for app to be ready (local mode only)
        if: ${{ env.BASE_URL == 'http://localhost:3000' }}
        run: bunx wait-on http://localhost:3000 --timeout 60000

      - name: Run Playwright tests
        run: bunx playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload test videos/screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-artifacts
          path: test-results/
          retention-days: 7
